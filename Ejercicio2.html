<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        .exercise-layout {
            border: 2px solid #333;
            background-color: white;
            padding: 6px;
        }

        .box {
            border: 3px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            font-size: 3rem;
            font-weight: bold;
            color: white;
        }

        .bg-a { background-color: #ffe800; }
        .bg-b { background-color: #40ddb0; }
        .bg-c { background-color: #ca73d9; }

        @media (min-width: 768px) {
            .bg-a {
                height: 125px;
            }

            .bg-b,
            .bg-c {
                height: 330px;
            }
        }

        @media (max-width: 767px) {
            .bg-a {
                height: 95px;
            }

            .bg-b {
                height: 210px;
            }

            .bg-c {
                height: 80px;
            }
        }
    </style>
</head>
<body>

    <div class="container my-5">
        <h2 class="mb-4">Ejercicio 2 Bootstrap</h2>

        <div class="exercise-layout">
            <div class="row g-2">
                <div class="col-12">
                    <div class="box bg-a">A</div>
                </div>

                <div class="col-12 col-md-8">
                    <div class="box bg-b">B</div>
                </div>

                <div class="col-12 col-md-4">
                    <div class="box bg-c">C</div>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
